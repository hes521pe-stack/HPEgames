<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="keywords" content="front-end web developer, unblocked, games, google sites, unblocked games mom, ublocked, code, coding, programmer, development, javascript, jquery, bootstrap, sass, less, git" />
    <meta property="og:title" content="Welcome to game lite, a lightweight, fast, and clean game site." />
    <meta property="og:site_name" content="game" />
    <meta property="og:description" content="Welcome to game lite, a lightweight, fast, and clean game site." />
    <meta name="description" content="Welcome to game lite, a lightweight, fast, and clean game site." />
    <meta name="author" content="game" />
    <title>HPEGames | Home</title>
    <style>
      :root {
        --hpe-red: #eb4034;
        --hpe-gold: #f5b027;
        --hpe-black: #1a1a1a;
        --poki-shadow: 0 8px 0px rgba(0, 0, 0, 0.2);
      }

      body {
        background-color: var(--hpe-red);
        color: white;
        font-family: 'Arial Black', sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }

      /* Hero Section */
      .hero-container {
        background-color: var(--hpe-black);
        padding: 50px 30px;
        border-radius: 40px;
        box-shadow: var(--poki-shadow);
        border: 5px solid var(--hpe-black);
        max-width: 600px;
        width: 90%;
        margin: 20px;
      }

      h1 {
        font-size: 4rem;
        margin: 0;
        line-height: 1;
        text-transform: uppercase;
        color: white;
      }

      #subtitle {
        display: block;
        font-size: 1.2rem;
        color: var(--hpe-gold);
        margin-top: 10px;
        font-family: sans-serif;
        font-weight: bold;
      }

      p.description {
        font-family: sans-serif;
        font-size: 1.1rem;
        color: #cccccc;
        margin: 30px 0;
        line-height: 1.6;
      }

      /* Button Navigation */
      .nav-menu {
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
      }

      .btn-poki {
        width: 100%;
        max-width: 300px;
        cursor: pointer;
        background-color: var(--hpe-gold);
        border: none;
        color: var(--hpe-black);
        padding: 18px 30px;
        font-weight: 900;
        font-size: 20px;
        border-radius: 20px;
        box-shadow: 0 6px 0px #b8861b;
        transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        text-decoration: none;
        display: inline-block;
        text-transform: uppercase;
      }

      .btn-poki:hover {
        transform: scale(1.03);
      }

      .btn-poki:active {
        transform: translateY(4px);
        box-shadow: 0 2px 0px #b8861b;
      }

      .btn-secondary {
        background-color: #444;
        color: white;
        box-shadow: 0 6px 0px #222;
        font-size: 16px;
      }
      
      .btn-secondary:active {
        box-shadow: 0 2px 0px #222;
      }

      footer {
        margin-top: 30px;
        font-family: sans-serif;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.7);
      }

      /* Background Decoration */
      .bg-pattern {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        opacity: 0.1;
        background-image: radial-gradient(var(--hpe-black) 2px, transparent 2px);
        background-size: 30px 30px;
      }
    </style>
  </head>
  <body>
    <div class="bg-pattern"></div>

    <div class="hero-container">
      <h1>HPEGAMES</h1>
      <span id="subtitle">...</span>
      
      <p class="description">
        Lightweight, lightning fast, and simple.<br>
        Your premium portal for unblocked fun.
      </p>

      <div class="nav-menu">
        <a href="/projects" class="btn-poki">Play Games</a>
        <a href="/Hproxy/" class="btn-poki">HProxy</a>
        <a href="/misc" class="btn-poki btn-secondary">Tools & Settings</a>
      </div>
    </div>

    <footer>
      &copy; HPE, 2026. All rights reserved.
    </footer>

    <script src="/js/main.js"></script>
    <script src="/js/subtitle.js"></script>
  </body>
</html>
