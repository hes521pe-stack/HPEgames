<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>Miscellaneous | HPEGames</title>
    <style>
      :root {
        --hpe-red: #eb4034;
        --hpe-gold: #f5b027;
        --hpe-black: #1a1a1a;
        --hpe-dark-gray: #2c2c2c;
        --poki-shadow: 0 6px 0px rgba(0, 0, 0, 0.2);
      }

      body {
        background-color: var(--hpe-red);
        color: white;
        font-family: 'Arial Black', sans-serif;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h2 {
        font-size: 3rem;
        text-transform: uppercase;
        text-shadow: 3px 3px 0px var(--hpe-black);
        margin-bottom: 40px;
        text-align: center;
      }

      /* Card Styling */
      .misc-card {
        background-color: var(--hpe-black);
        width: 100%;
        max-width: 600px;
        padding: 30px;
        border-radius: 25px;
        margin-bottom: 30px;
        border: 4px solid var(--hpe-black);
        box-shadow: var(--poki-shadow);
      }

      h1 {
        color: var(--hpe-gold);
        font-size: 1.8rem;
        margin-top: 0;
        text-transform: uppercase;
      }

      p {
        font-family: sans-serif;
        line-height: 1.5;
        color: #ddd;
      }

      /* Inputs */
      input[type="url"], input[type="text"] {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 12px;
        background-color: var(--hpe-dark-gray);
        color: #ffffff;
        font-size: 16px;
        box-sizing: border-box;
        margin: 10px 0;
        outline: none;
        border: 2px solid transparent;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: var(--hpe-gold);
      }

      /* Buttons */
      .btn-poki {
        cursor: pointer;
        background-color: var(--hpe-gold);
        border: none;
        color: var(--hpe-black);
        padding: 12px 24px;
        font-weight: 900;
        font-size: 16px;
        border-radius: 15px;
        box-shadow: 0 5px 0px #b8861b;
        transition: all 0.1s;
        text-transform: uppercase;
      }

      .btn-poki:active {
        transform: translateY(4px);
        box-shadow: 0 1px 0px #b8861b;
      }

      .btn-purple {
        background-color: #b625c;
        box-shadow: 0 5px 0px #b625c;
        color: white;
      }
      
      .btn-purple:active {
        box-shadow: 0 1px 0px #7a198a;
      }

      .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 15px;
      }

      /* Ad Consent Checkbox Styling */
      .checkbox-container {
        display: flex;
        align-items: center;
        gap: 15px;
        background: var(--hpe-dark-gray);
        padding: 15px;
        border-radius: 12px;
      }

      input[type="checkbox"] {
        transform: scale(1.5);
        cursor: pointer;
      }

      .home-link {
        margin-top: 20px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>

    <h2>Miscellaneous</h2>

    <div class="misc-card">
      <h1>about:blank</h1>
      <p>Enter a URL to open in a clean about:blank page for extra privacy:</p>
      <input id="url-target" type="url" placeholder="https://google.com" />
      <div class="button-group">
        <button id="create" class="btn-poki btn-purple">Create Page</button>
      </div>
    </div>

    <div class="misc-card">
      <h1>Tab Cloaker</h1>
      <p>Change the site's title or icon to hide it in your browser history.</p>
      <input id="userinput" type="text" placeholder="Enter Title or Image URL" />
      <p id="console-output" style="color: var(--hpe-gold); font-size: 14px;"></p>
      <div class="button-group">
        <button onclick="changeTabTitle();" class="btn-poki">Set Title</button>
        <button onclick="changeTabIcon();" class="btn-poki">Set Icon</button>
        <button onclick="resetTabSettings();" class="btn-poki" style="background-color: #555; box-shadow: 0 5px 0 #333; color: white;">Reset</button>
      </div>
    </div>

    <div class="misc-card">
      <h1>Ads Settings</h1>
      <p>Disable ads if they are causing performance issues or slowing down your experience.</p>
      <div class="checkbox-container">
        <input type="checkbox" id="adConsent" name="adConsent">
        <label for="adConsent" style="font-family: sans-serif; cursor: pointer;">Do not show ads at all</label>
      </div>
    </div>

    <a href="/index.html" class="home-link">
      <button class="btn-poki">Go to the homepage</button>
    </a>

    <script src="/js/misc.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
